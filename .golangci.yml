version: "2"

run:
  timeout: 5m

# Default linters (errcheck, govet, ineffassign, staticcheck, unused) plus a few
# high-signal extras. revive's exported-comment rules are intentionally omitted.
linters:
  enable:
    - misspell
    - unconvert
  exclusions:
    presets:
      - std-error-handling # don't flag unchecked Close()/Write() on http bodies

formatters:
  enable:
    - gofmt
    - goimports
